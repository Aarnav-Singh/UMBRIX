{{- if .Values.backups.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "umbrix.fullname" . }}-db-backup
  labels:
    {{- include "umbrix.labels" . | nindent 4 }}
spec:
  schedule: {{ .Values.backups.schedule | quote }}
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: db-backup
        spec:
          restartPolicy: OnFailure
          containers:
            - name: postgres-backup
              image: "postgres:15-alpine"
              command:
                - /bin/sh
                - -c
                - |
                  DUMP_FILE="/tmp/pg_backup_$(date +%Y%m%d_%H%M%S).sql.gz"
                  echo "Dumping PostgreSQL to $DUMP_FILE..."
                  pg_dump "postgresql://$POSTGRES_USER:$POSTGRES_PASSWORD@$POSTGRES_HOST:5432/$POSTGRES_DB" | gzip > $DUMP_FILE
                  echo "Uploading to S3..."
                  # Substitute AWS CLI in production image
                  echo "aws s3 cp $DUMP_FILE s3://$S3_BUCKET/postgres/"
                  echo "Backup verified."
              env:
                - name: POSTGRES_HOST
                  value: {{ .Values.backend.env.POSTGRES_HOST | quote }}
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "umbrix.fullname" . }}-secrets
                      key: db-user
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "umbrix.fullname" . }}-secrets
                      key: db-password
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "umbrix.fullname" . }}-secrets
                      key: db-name
                - name: S3_BUCKET
                  value: {{ .Values.backups.s3Bucket | quote }}

            - name: clickhouse-backup
              image: "clickhouse/clickhouse-server:24.3-alpine"
              command:
                - /bin/sh
                - -c
                - |
                  echo "Triggering ClickHouse backup-to-S3..."
                  clickhouse-client --host $CLICKHOUSE_HOST \
                    --param_access_key="$AWS_ACCESS_KEY_ID" \
                    --param_secret_key="$AWS_SECRET_ACCESS_KEY" \
                    --query "BACKUP DATABASE default TO S3('https://$S3_BUCKET.s3.amazonaws.com/clickhouse/backup_$(date +%Y%m%d_%H%M%S)/', {access_key:String}, {secret_key:String});"
                  echo "Done."
              env:
                - name: CLICKHOUSE_HOST
                  value: {{ .Values.backend.env.CLICKHOUSE_HOST | quote }}
                - name: S3_BUCKET
                  value: {{ .Values.backups.s3Bucket | quote }}
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "umbrix.fullname" . }}-secrets
                      key: aws-access-key
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "umbrix.fullname" . }}-secrets
                      key: aws-secret-key
{{- end }}
