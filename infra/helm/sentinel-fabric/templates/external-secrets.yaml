# Sentinel Fabric V2 — External Secrets Operator (ESO)
# Syncs secrets from HashiCorp Vault into K8s Secrets automatically.
# Prerequisites:
#   1. Install ESO: helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#   2. Create a Vault AppRole or K8s auth method for ESO service account.

{{- if .Values.externalSecrets.enabled }}

# ── ClusterSecretStore: Vault Backend ─────────────────
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ .Release.Name }}-vault-store
spec:
  provider:
    vault:
      server: {{ .Values.externalSecrets.vaultUrl | quote }}
      path: {{ .Values.externalSecrets.vaultMountPoint | default "secret" | quote }}
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: {{ .Values.externalSecrets.vaultRole | default "sentinel-fabric" | quote }}
          serviceAccountRef:
            name: default

---
# ── ExternalSecret: Pulls secrets into K8s Secret ────
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-external-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Release.Name }}-vault-store
    kind: SecretStore
  target:
    name: {{ .Release.Name }}-secrets
    creationPolicy: Owner
  data:
    - secretKey: jwt-secret-key
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath | default "data/sentinel" }}
        property: jwt_secret_key

    - secretKey: postgres-dsn
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath | default "data/sentinel" }}
        property: postgres_dsn

    {{- if .Values.backend.vault.enabled }}
    - secretKey: vault-token
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath | default "data/sentinel" }}
        property: vault_token
    {{- end }}

    - secretKey: grafana-admin-password
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath | default "data/sentinel" }}
        property: grafana_admin_password

{{- end }}
