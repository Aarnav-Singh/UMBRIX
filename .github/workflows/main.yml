name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    # Needs ClickHouse, Postgres, Redis for integration tests
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: sentinel
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
          POSTGRES_DB: sentinel_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
          
      clickhouse:
        image: clickhouse/clickhouse-server:23.8-alpine
        env:
          CLICKHOUSE_USER: default
          CLICKHOUSE_PASSWORD: ${{ secrets.CI_CLICKHOUSE_PASSWORD }}
          CLICKHOUSE_DB: sentinel
        ports:
          - 8123:8123
          - 9000:9000
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio httpx
        
    - name: Run Pytest
      run: |
        cd backend
        pytest tests/
      env:
        ENVIRONMENT: test
        JWT_SECRET_KEY: ${{ secrets.CI_JWT_SECRET_KEY }}
        INTERNAL_SERVICE_API_KEY: ${{ secrets.CI_INTERNAL_SERVICE_API_KEY }}
        POSTGRES_HOST: localhost
        POSTGRES_USER: sentinel
        POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
        POSTGRES_DB: sentinel_db
        CLICKHOUSE_HOST: localhost
        CLICKHOUSE_USER: default
        CLICKHOUSE_PASSWORD: ${{ secrets.CI_CLICKHOUSE_PASSWORD }}
        REDIS_HOST: localhost
        
  test-frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        
    - name: Install dependencies
      run: |
        cd frontend
        npm ci || npm install
        
    - name: Run linter
      run: |
        cd frontend
        npm run lint
        
    - name: Build
      run: |
        cd frontend
        npm run build
