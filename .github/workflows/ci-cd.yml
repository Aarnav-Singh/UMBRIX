name: Sentinel Fabric V2 — CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/sentinel-fabric

jobs:
  # ── Stage 1: Lint & Test ───────────────────────────
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linter
        run: python -m py_compile app/main.py

      - name: Run tests
        env:
          JWT_SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: development
        run: pytest tests/ -v --tb=short

      - name: SAST — Bandit security scan
        run: |
          pip install bandit
          bandit -r app/ -ll -ii --exclude app/tests,app/__pycache__ -f json -o bandit-report.json || true
          # Fail pipeline on HIGH severity findings
          bandit -r app/ -ll -ii --exclude app/tests,app/__pycache__ --severity-level high

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-sast-report
          path: backend/bandit-report.json
          retention-days: 30

  # ── Stage 2: Build & Push Docker Images ────────────
  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        component: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.component }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.component }}:latest

  # ── Stage 3: Deploy to Staging ─────────────────────
  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_STAGING }}

      - name: Deploy with Helm
        run: |
          helm upgrade --install sentinel-fabric \
            infra/helm/sentinel-fabric \
            --namespace sentinel \
            --create-namespace \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set backend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend \
            --set frontend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend \
            --set postgres.auth.password=${{ secrets.POSTGRES_PASSWORD }} \
            --set backend.env.JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            --wait --timeout 5m

      - name: Verify deployment
        run: |
          kubectl -n sentinel rollout status deployment/sentinel-fabric-backend --timeout=120s
          kubectl -n sentinel rollout status deployment/sentinel-fabric-frontend --timeout=120s

  # ── Stage 4: Security Scanning (SAST + Container) ──
  security-scan:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python dependency audit (pip-audit)
        run: |
          pip install pip-audit
          cd backend && pip-audit --strict --desc || true

      - name: Container scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}"
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

  # ── Stage 5: Deploy to Production ──────────────────
  deploy-production:
    needs: [deploy-staging, security-scan]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://sentinel.example.com

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.14.0

      - name: Configure kubectl (production)
        uses: azure/k8s-set-context@v4
        with:
          kubeconfig: ${{ secrets.KUBE_CONFIG_PRODUCTION }}

      - name: Deploy with Helm (production)
        run: |
          helm upgrade --install sentinel-fabric \
            infra/helm/sentinel-fabric \
            --namespace sentinel \
            --create-namespace \
            -f infra/helm/sentinel-fabric/values.yaml \
            --set global.environment=production \
            --set backend.image.tag=${{ github.sha }} \
            --set frontend.image.tag=${{ github.sha }} \
            --set backend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-backend \
            --set frontend.image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend \
            --set postgres.auth.password=${{ secrets.PROD_POSTGRES_PASSWORD }} \
            --set backend.env.JWT_SECRET_KEY=${{ secrets.PROD_JWT_SECRET_KEY }} \
            --set backend.vault.enabled=true \
            --set backend.vault.url=${{ secrets.VAULT_URL }} \
            --wait --timeout 10m

      - name: Verify production deployment
        run: |
          kubectl -n sentinel rollout status deployment/sentinel-fabric-backend --timeout=180s
          kubectl -n sentinel rollout status deployment/sentinel-fabric-frontend --timeout=180s

      - name: Smoke test
        run: |
          ENDPOINT=$(kubectl -n sentinel get ingress sentinel-fabric-ingress -o jsonpath='{.spec.rules[0].host}')
          curl -sf "https://${ENDPOINT}/api/v1/health" || echo "Smoke test: endpoint not yet DNS-resolvable (expected in fresh clusters)"

